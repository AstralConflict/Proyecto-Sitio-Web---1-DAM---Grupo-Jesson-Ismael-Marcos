<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/index_style.css">
    <script src="js/index_script.js" defer></script>
    <title>Pagina Web Relojes</title>
</head>
<body>
    <header>
        <div id="menuLogo">
            <div id="cajitaLogo"></div>
        </div>
        <div id="menuNavegacion">
            <div id="degradadoIzquierda"></div>
            <div id="contenedorNavMenu">
                <nav id="navMenu">
                    <ul>
                        <li><a href="#">Inicio</a></li>
                        <li><a href="#">Servicios</a></li>
                        <li><a href="#">Proyectos</a></li>
                        <li><a href="#">Contacto</a></li>
                    </ul>
                </nav>
            </div>
            <div id="degradadoDerecha"></div>
        </div>
        <div id="menuBotones">
            <div id="cajitaBotones">
                <button class="botonInicio">
                    <img src="multimedia/IconoCarrito.png" alt="">
                </button>
                <button class="botonInicio">
                    <img src="multimedia/IconoContacto.png" alt="">
                </button>
            </div>
        </div>
    </header>
    <main>
        <div id="contenedorSticky">
            <section id="seccionPrincipal"> 
                <img class="imagenFondo" src="multimedia/ImagenFondoSeccionInicio1V8.png" alt="Imagen de fondo de la página de inicio">
                <div class="carta"></div>
            </section>
        </div>
        <section id="bentoGrid">
            <div class="contenedorBento">
                <div class="cartaBento cartaBento1"></div>
                <div class="cartaBento cartaBento2"></div>
                <div class="cartaBento cartaBento3"></div>
                <div class="cartaBento cartaBento4"></div>
                <div class="cartaBento cartaBento5"></div>
                <div class="cartaBento cartaBento6"></div>
            </div>
        </section>
        <section id="contenedorExpositorReloj">
            <div class="expositorReloj">
                <div class="secionExpIzquierda">
                    <p class="pColorReloj">COLOR CREMA</p>
                    <h2 class="nombreReloj">CAELUM IORION S2</h2>
                    <p class="pReferenciaReloj">Ref. CAELUM-IORION-S2 1383774G</p>
                </div>
                <div class="seccionExpCentro">
                    <div class="contenedorImagenExpositor">
                        <img id="imagenRelojCaelum" src="multimedia/RelojCaelumIorionS2V2.png" alt="">
                    </div>
                </div>
                <div class="seccionExpDerecha">

                </div>
                </div>
        </section>
    </main>

</body>
</html>
