<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Personalizar Reloj</title>

    <link rel="stylesheet" href="../css/personalizacion_style.css">
    <link rel="stylesheet" href="../css/header_style.css">
    <script src="../js/personalizacion.js"></script>
</head>
<body>
<header>
    <!-- LOGO -->
    <div class="menuLogo">
        <div class="cajitaLogo"></div>
    </div>

    <!-- NAVEGACIÓN -->
    <div class="menuNavegacion">
        <div class="degradadoIzquierda"></div>

        <div class="contenedorNavMenu">
            <nav class="navMenu">
                <ul>
                    <li><a href="../index.html">Inicio</a></li>
                    <li><a href="../html/productos.html">Productos</a></li>
                    <li><a href="../html/personalizacion.html">Personalizacion</a></li>
                    <li><a href="../html/comparador.html">Comparador</a></li>
                </ul>
            </nav>
        </div>

        <div class="degradadoDerecha"></div>
    </div>

    <!-- BOTONES -->
    <div class="menuBotones">
        <div class="cajitaBotones">
            <button class="botonMenu">
                <img src="../multimedia/IconoCarrito.png" alt="Carrito">
            </button>

            <button class="botonMenu">
                <img src="../multimedia/IconoContacto.png" alt="Contacto">
            </button>
        </div>
    </div>
</header>
<div class="contenedor">

    <div class="seccion-reloj">
        <button class="flecha flecha-izquierda">&#10094;</button>

        <div class="reloj">
            <img src="../multimedia/RolexDateJust.png" id="imagen-reloj">
        </div>

        <button class="flecha flecha-derecha">&#10095;</button>
    </div>

    <!-- TEXTO NUEVO ENCIMA DE LOS ACCESORIOS -->
    <h2 class="texto-personaliza">Personalízalo a tu gusto</h2>

    <!-- CONTENEDOR DE ACCESORIOS -->
    <div class="contenedor-accesorios">

        <div class="accesorio">
            <input type="checkbox" id="pulsera">
            <label for="pulsera">
                <span class="tick"></span>
                <img src="../multimedia/pulsera.png">
                <p>Pulsera</p>
            </label>
        </div>

        <div class="accesorio">
            <input type="checkbox" id="joya">
            <label for="joya">
                <span class="tick"></span>
                <img src="../multimedia/joya.png">
                <p>Joya</p>
            </label>
        </div>

        <div class="accesorio">
            <input type="checkbox" id="anillo">
            <label for="anillo">
                <span class="tick"></span>
                <img src="../multimedia/anillo.png">
                <p>Anillo</p>
            </label>
        </div>

        <div class="accesorio">
            <input type="checkbox" id="caja">
            <label for="caja">
                <span class="tick"></span>
                <img src="../multimedia/caja.png">
                <p>Caja</p>
            </label>
        </div>

        <div class="accesorio">
            <input type="checkbox" id="tarjeta-regalo">
            <label for="tarjeta-regalo">
                <span class="tick"></span>
                <img src="../multimedia/regalo.png">
                <p>Tarjeta</p>
            </label>
        </div>

    </div>

    <div class="texto-personaliza">Personalízalo a tu gusto</div>
    <div class="contenedor-carrito">
        <a href="../html/carrito.html" class="boton-pagar">Pagar</a>
    </div>

</div>


</body>
</html>
